<!-- 这是HTML注释，不会显示在网页上 -->
<!DOCTYPE html>
<!-- 声明这是一个网页 -->
<html lang="zh-CN">
<!-- 网页的根标签，所有内容都放这里 -->
<head>
    <!-- 头部：设置网页基础信息 -->
    <meta charset="UTF-8">
    <title>我的第一个项目</title>
    <!-- 网页标题（浏览器标签显示的文字） -->
    <style>
        /* CSS样式：让网页变好看，这是美化代码 */
        body {
            background-color: #f0f8ff; /* 背景色 */
            text-align: center; /* 文字居中 */
            margin-top: 100px;
        }
        .card {
            width: 300px;
            margin: 0 auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
        }
    </style>
</head>

<body>
    <!-- 身体：网页真正显示的内容 -->
    <div class="card">
        <h1>你好！我是嘻嘻嘻</h1>
        <p>我的爱好：敲代码、听歌、旅行</p>
        <p>这是我的第一个编程项目 ✨</p>
    </div>
</body>
</html>
